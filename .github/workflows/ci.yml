name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show project files
        run: ls -la

      - name: Build Docker image
        run: docker build -t dockerized-flask-postgresql-app .

      - name: Start Docker Compose services
        run: docker compose up -d

      - name: Show running containers
        run: docker ps

      - name: Test web app response
        run: |
          for i in {1..10}; do
            curl http://localhost:5000 && exit 0
            echo "App not ready yet. Retrying..."
            sleep 3
          done
          exit 1

      - name: Show Docker Compose logs
        if: always()
        run: docker compose logs

      - name: Stop Docker Compose services
        if: always()
        run: docker compose down

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy application to VM
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} "
            cd ${{ secrets.VM_PROJECT_PATH }} &&
            git pull origin main &&
             docker compose up -d --build &&
             docker compose ps
          "